<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: none;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-image: url('/Users/zavienumlani/Downloads/jonatan-pie-3l3RwQdHRHg-unsplash.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.55) saturate(1.2);
      z-index: 0;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    #aurora {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,200,180,0.07) 0%, transparent 70%);
      animation: aurораPulse 8s ease-in-out infinite alternate;
    }

    @keyframes aurораPulse {
      0%   { opacity: 0.4; transform: scaleX(1);   }
      50%  { opacity: 0.9; transform: scaleX(1.1); }
      100% { opacity: 0.5; transform: scaleX(0.95); }
    }

    #clock-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #time {
      font-size: clamp(80px, 16vw, 200px);
      font-weight: 100;
      letter-spacing: 0.04em;
      color: #b8f0e8;
      text-shadow:
        0 0 40px rgba(0,220,200,0.6),
        0 0 80px rgba(0,160,180,0.35),
        0 0 160px rgba(0,100,140,0.2);
      animation: glow 4s ease-in-out infinite alternate;
      line-height: 1;
      user-select: none;
    }

    @keyframes glow {
      0%   { text-shadow: 0 0 30px rgba(0,220,200,0.5), 0 0 70px rgba(0,160,180,0.25); }
      100% { text-shadow: 0 0 60px rgba(0,220,200,0.9), 0 0 120px rgba(0,200,220,0.5), 0 0 200px rgba(0,120,160,0.3); }
    }

    #seconds-bar {
      margin-top: 18px;
      width: clamp(200px, 30vw, 500px);
      height: 2px;
      background: rgba(0,200,180,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    #seconds-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(0,200,180,0.3), #00e8cc);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(0,220,200,0.8);
      transition: width 0.95s linear;
    }

    #date {
      margin-top: 24px;
      font-size: clamp(16px, 2.5vw, 32px);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(160, 230, 220, 0.7);
      text-shadow: 0 0 20px rgba(0,200,180,0.4);
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="stars"></canvas>
  <div id="aurora"></div>
  <div id="clock-wrap">
    <div id="time">00:00:00</div>
    <div id="seconds-bar"><div id="seconds-fill"></div></div>
    <div id="date"></div>
  </div>

  <script>
    // Stars
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function initStars(n = 180) {
      stars = Array.from({ length: n }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.65,
        r: Math.random() * 1.2 + 0.2,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.5 + 0.2,
      }));
    }
    initStars();
    window.addEventListener('resize', initStars);

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        const alpha = 0.3 + 0.5 * Math.sin(s.phase + t * s.speed * 0.001);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,240,235,${alpha.toFixed(3)})`;
        ctx.fill();
      }
    }

    // Clock
    const timeEl  = document.getElementById('time');
    const dateEl  = document.getElementById('date');
    const fillEl  = document.getElementById('seconds-fill');
    const days    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick(t) {
      const now = new Date();
      const h = pad(now.getHours());
      const m = pad(now.getMinutes());
      const s = pad(now.getSeconds());
      timeEl.textContent = `${h}:${m}:${s}`;

      const pct = (now.getSeconds() / 60) * 100;
      fillEl.style.width = pct + '%';

      dateEl.textContent = `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

      drawStars(t);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Full screen on click / key
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
    });
  </script>
</body>
</html>
